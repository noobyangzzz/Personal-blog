                    <div class="article-detail-content">
                        <p>《天空之城》是宫崎骏1986年的动画电影，久石让为其创作了经典配乐。</p>
                        <p>久石让的钢琴曲有着独特的东方韵味，旋律优美而忧伤。</p>
                        <p>每次听到这首曲子，仿佛能看到拉普达古城漂浮在云端的景象，那是一个关于梦想、科技与人性的故事。</p>
                        <p>久石让与宫崎骏的合作是动画电影配乐的标杆，从《风之谷》到《千与千寻》，每一首曲子都精准地传达了电影的情感。</p>
