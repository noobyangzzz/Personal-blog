<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>noobyangzzz</title>
    <link rel="stylesheet" href="css/style.css?v=20260325">
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.js"></script>
</head>
<body>
    <div id="app">
        <header class="header">
            <div class="container">
                <h1 class="logo"><a href="/">noobyangzzz</a></h1>
                <nav class="nav">
                    <router-link to="/" class="nav-link" :class="{ active: $route.path === '/' }">首页</router-link>
                    <template v-for="section in sections" :key="section.id">
                        <router-link :to="'/section/' + section.id" class="nav-link" :class="{ active: $route.params.sectionId == section.id }">{{ section.name }}</router-link>
                    </template>
                </nav>
            </div>
        </header>

        <main class="main">
            <router-view :key="$route.fullPath"></router-view>
        </main>

        <footer class="footer">
            <div class="container">
                <p>&copy; 2026 noobyangzzz. All rights reserved.</p>
            </div>
        </footer>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
